version: '3.8'

services:
  csv-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csv-bridge
    ports:
      - "8080:8080"
    volumes:
      - ./data:/var/csv-files
      - ./config.yaml:/app/config.yaml
    environment:
      - CSV_BRIDGE_HOST=0.0.0.0
      - CSV_BRIDGE_PORT=8080
      - CSV_BRIDGE_UPLOAD_DIR=/var/csv-files
      - CSV_BRIDGE_VPS_URL=${VPS_URL:-https://your-vps-app.com}
      - CSV_BRIDGE_API_TOKEN=${VPS_API_TOKEN}
      - CSV_BRIDGE_API_KEY=${BRIDGE_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - csv-bridge-network

networks:
  csv-bridge-network:
    driver: bridge

volumes:
  csv-data:
    driver: local