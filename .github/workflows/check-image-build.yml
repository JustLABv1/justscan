name: Check Image Build

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches: [ "release/**", "develop" ]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'deployment-examples/**'

jobs:
  frontend:
    name: Check Standalone Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: cd services/frontend && docker build . --file Dockerfile --tag github.com/justnz/justwms:frontend-test
  backend:
    name: Check Standalone Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: cd services/backend && docker build . --file Dockerfile --tag github.com/justnz/justwms:backend-test
  justwms:
    name: Check JustWMS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build JustWMS Docker Image
        run: docker build . --file Dockerfile --tag github.com/justnz/justwms:test
