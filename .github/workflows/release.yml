name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Frontend Docker Image
        run: cd services/frontend && docker build . --file Dockerfile --tag ghcr.io/justlabv1/justwms:frontend-latest --tag ghcr.io/justlabv1/justwms:frontend-${{ github.sha }} --tag ghcr.io/justlabv1/justwms:frontend-${{ github.ref_name }}

      - name: Build Backend Docker Image
        run: cd services/backend && docker build . --file Dockerfile --tag ghcr.io/justlabv1/justwms:backend-latest --tag ghcr.io/justlabv1/justwms:backend-${{ github.sha }} --tag ghcr.io/justlabv1/justwms:backend-${{ github.ref_name }}

      - name: Build JustWMS Docker Image
        run: docker build . --file Dockerfile --tag ghcr.io/justlabv1/justwms:latest --tag ghcr.io/justlabv1/justwms:${{ github.sha }} --tag ghcr.io/justlabv1/justwms:${{ github.ref_name }}

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Push Docker Images
        run: |
          docker push ghcr.io/justlabv1/justwms:frontend-latest
          docker push ghcr.io/justlabv1/justwms:frontend-${{ github.sha }}
          docker push ghcr.io/justlabv1/justwms:frontend-${{ github.ref_name }}
          docker push ghcr.io/justlabv1/justwms:backend-latest
          docker push ghcr.io/justlabv1/justwms:backend-${{ github.sha }}
          docker push ghcr.io/justlabv1/justwms:backend-${{ github.ref_name }}
          docker push ghcr.io/justlabv1/justwms:latest
          docker push ghcr.io/justlabv1/justwms:${{ github.sha }}
          docker push ghcr.io/justlabv1/justwms:${{ github.ref_name }}

  build-csv-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: cd services/csv-bridge && go mod download

      - name: Build Windows AMD64 binary
        run: |
          cd services/csv-bridge
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o csv-bridge-windows-amd64.exe ./main.go

      - name: Build Windows ARM64 binary
        run: |
          cd services/csv-bridge
          GOOS=windows GOARCH=arm64 go build -ldflags "-s -w" -o csv-bridge-windows-arm64.exe ./main.go

      - name: Build Windows 386 binary
        run: |
          cd services/csv-bridge
          GOOS=windows GOARCH=386 go build -ldflags "-s -w" -o csv-bridge-windows-386.exe ./main.go

      - name: Build Linux AMD64 binary
        run: |
          cd services/csv-bridge
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o csv-bridge-linux-amd64 ./main.go

      - name: Build Linux ARM64 binary
        run: |
          cd services/csv-bridge
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o csv-bridge-linux-arm64 ./main.go

      - name: Create checksums
        run: |
          cd services/csv-bridge
          sha256sum csv-bridge-windows-amd64.exe > csv-bridge-windows-amd64.exe.sha256
          sha256sum csv-bridge-windows-arm64.exe > csv-bridge-windows-arm64.exe.sha256
          sha256sum csv-bridge-windows-386.exe > csv-bridge-windows-386.exe.sha256
          sha256sum csv-bridge-linux-amd64 > csv-bridge-linux-amd64.sha256
          sha256sum csv-bridge-linux-arm64 > csv-bridge-linux-arm64.sha256

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csv-bridge-binaries
          path: |
            services/csv-bridge/csv-bridge-windows-amd64.exe
            services/csv-bridge/csv-bridge-windows-arm64.exe
            services/csv-bridge/csv-bridge-windows-386.exe
            services/csv-bridge/csv-bridge-linux-amd64
            services/csv-bridge/csv-bridge-linux-arm64
            services/csv-bridge/*.sha256

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build, build-csv-bridge]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CSV bridge binaries
        uses: actions/download-artifact@v4
        with:
          name: csv-bridge-binaries
          path: ./binaries
        
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          skipIfReleaseExists: true
          generateReleaseNotes: true
          artifacts: |
            binaries/csv-bridge-windows-amd64.exe
            binaries/csv-bridge-windows-arm64.exe
            binaries/csv-bridge-windows-386.exe
            binaries/csv-bridge-linux-amd64
            binaries/csv-bridge-linux-arm64
            binaries/csv-bridge-windows-amd64.exe.sha256
            binaries/csv-bridge-windows-arm64.exe.sha256
            binaries/csv-bridge-windows-386.exe.sha256
            binaries/csv-bridge-linux-amd64.sha256
            binaries/csv-bridge-linux-arm64.sha256
