---

log_level: info

port: 8080

database:
  server: localhost
  port: 5432
  name: justscan
  user: postgres
  password: postgres

jwt:
  secret: null

allow_origins:
  - "http://localhost:3000"
  - "http://localhost:4000"

scanner:
  trivy_path: trivy
  grype_path: grype
  enable_grype: false
  timeout: 600
  concurrency: 2
  db_max_age_hours: 24
  enable_osv_java_augmentation: true

encryption:
  key: ""

vuln_kb:
  nvd_api_key: ""
  cache_days: 7

oidc:
  enabled: false
  debug: false
  issuer_url: ""
  client_id: ""
  client_secret: ""
  redirect_uri: ""
  scopes: ["openid", "email", "profile"]
  admin_groups: []
  admin_roles: []
  groups_claim: "groups"
  roles_claim: "roles"

local_auth:
  enabled: true
