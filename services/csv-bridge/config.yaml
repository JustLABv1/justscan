server:
  host: "0.0.0.0"
  port: 8080
  upload_dir: "/var/csv-files"  # Directory where CSV files will be stored
  max_file_size: 10485760      # 10MB in bytes
  allowed_origins:
    - "*"                      # Allow all origins, configure as needed

# VPS Application Configuration
vps:
  base_url: "https://your-vps-app.com"  # Your VPS application URL
  api_token: "your-secret-api-token"    # Authentication token for your VPS
  register_interval: 300                # Register with VPS every 5 minutes (300 seconds)
  
# Bridge Service Configuration  
bridge:
  service_id: "csv-bridge-001"          # Unique identifier for this bridge service
  service_name: "Customer CSV Bridge"    # Human-readable name
  version: "1.0.0"

# Logging Configuration
logging:
  level: "info"  # debug, info, warn, error
  format: "json" # json or text
  
# Security Configuration
security:
  api_key: "customer-bridge-secret-key"  # API key for securing this service
  enable_cors: true
  trusted_proxies: []                    # List of trusted proxy IPs