name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      chart_version:
        description: Helm chart version to publish
        required: true
      app_version:
        description: App version for chart appVersion and default image tags
        required: true

env:
  IMAGE: ghcr.io/justlabv1/justscan
  HELM_CHART: justscan
  HELM_CHART_PATH: deploy/helm/justscan
  HELM_REGISTRY: ghcr.io/justlabv1/charts

jobs:
  build-backend:
    name: Build & Push Backend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern=backend-{{version}}
            type=raw,value=backend-latest

      - uses: docker/build-push-action@v6
        with:
          context: services/backend
          file: services/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build & Push Frontend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern=frontend-{{version}}
            type=raw,value=frontend-latest

      - uses: docker/build-push-action@v6
        with:
          context: services/frontend
          file: services/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_API_URL is intentionally empty so API calls use relative paths (/api/v1/...).
          # nginx routes /api/* to the backend — works on any domain without rebuilding.
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  build-combined:
    name: Build & Push Combined Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=combined
          cache-to: type=gha,scope=combined,mode=max

  release-helm-chart:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Resolve release versions
        id: vars
        env:
          INPUT_CHART_VERSION: ${{ github.event.inputs.chart_version }}
          INPUT_APP_VERSION: ${{ github.event.inputs.app_version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            chart_version="$INPUT_CHART_VERSION"
            app_version="$INPUT_APP_VERSION"
          else
            chart_version="${GITHUB_REF_NAME#v}"
            app_version="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$chart_version" || -z "$app_version" ]]; then
            echo "chart_version and app_version must be set" >&2
            exit 1
          fi

          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Build chart dependencies
        run: helm dependency build "${{ env.HELM_CHART_PATH }}"

      - name: Lint chart
        run: helm lint "${{ env.HELM_CHART_PATH }}"

      - name: Package chart
        run: |
          mkdir -p dist
          helm package "${{ env.HELM_CHART_PATH }}" \
            --destination dist \
            --version "${{ steps.vars.outputs.chart_version }}" \
            --app-version "${{ steps.vars.outputs.app_version }}"

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: helm push "dist/${{ env.HELM_CHART }}-${{ steps.vars.outputs.chart_version }}.tgz" "oci://${{ env.HELM_REGISTRY }}"

      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/${{ env.HELM_CHART }}-${{ steps.vars.outputs.chart_version }}.tgz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-combined, release-helm-chart]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist

      - uses: ncipollo/release-action@v1
        with:
          name: Release ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          skipIfReleaseExists: true
          generateReleaseNotes: true
          artifacts: dist/*.tgz
          artifactErrorsFailBuild: true
