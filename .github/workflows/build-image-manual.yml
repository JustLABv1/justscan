name: Build Image (Manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and push'
        required: true
        default: 'main'

env:
  IMAGE: ghcr.io/justlabv1/justscan

jobs:
  build:
    name: Build & Push All Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v7
        with:
          context: services/backend
          file: services/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:backend-${{ github.event.inputs.branch }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: services/frontend
          file: services/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:frontend-${{ github.event.inputs.branch }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build & Push Combined
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.event.inputs.branch }}
          cache-from: type=gha,scope=combined
          cache-to: type=gha,scope=combined,mode=max
