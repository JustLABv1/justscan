---

log_level: info

port: 8080

database:
  # "postgres" resolves to the postgres container inside the docker-compose network.
  server: postgres
  port: 5432
  name: justscan
  user: postgres
  # Must match POSTGRES_PASSWORD in .env
  password: "change-me-in-production"

jwt:
  # Use a long random string. Generate one with: openssl rand -hex 32
  secret: "change-me-in-production"

# CORS origins allowed to call the API.
# Must match the URL users open in their browser to access the frontend.
# For local:  http://localhost:3000
# For remote: http://YOUR_SERVER_IP:3000  or  https://your.domain.com
allow_origins:
  - "http://localhost:3000"

scanner:
  enable_trivy: true
  trivy_path: trivy
  grype_path: grype
  enable_grype: false
  timeout: 600
  command_timeout_seconds: 7200
  progress_heartbeat_seconds: 30
  stale_timeout_seconds: 7200
  concurrency: 2
  db_max_age_hours: 7
  enable_osv_java_augmentation: true

encryption:
  # 64-character hex string. Generate one with: openssl rand -hex 32
  key: "change-me-in-production-64-char-hex-replace-this-with-real-value"

vuln_kb:
  # Optional: speeds up CVE enrichment. Get a key at https://nvd.nist.gov/developers/request-an-api-key
  nvd_api_key: ""

# OIDC single sign-on (optional)
# Supported providers: Keycloak, Authentik, Okta, Azure AD, Google, etc.
oidc:
  enabled: false
  # The issuer URL of your OIDC provider (the base URL, without /.well-known/openid-configuration)
  issuer_url: ""
  client_id: ""
  # client_secret: set via BACKEND_OIDC_CLIENT_SECRET env var or here
  client_secret: ""
  # Callback URL registered in your OIDC provider (must match exactly)
  # Example: https://your.domain.com/api/v1/auth/oidc/callback
  redirect_uri: ""
  scopes: ["openid", "email", "profile"]
  # Users in these groups/roles are given the admin role in JustScan
  admin_groups: []
  admin_roles: []
  # Claims in the ID token that contain group/role memberships
  groups_claim: "groups"
  roles_claim: "roles"

# Set to false to disable local username/password authentication entirely
local_auth:
  enabled: true
  cache_days: 7
