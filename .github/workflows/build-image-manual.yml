name: Build Image Manual Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and release'
        required: true
        default: 'develop'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Build Frontend Docker Image
        run: cd services/frontend && docker build . --file Dockerfile --tag ghcr.io/justlabv1/plattform-template:frontend-${{ github.sha }} --tag ghcr.io/justlabv1/plattform-template:frontend-${{ github.ref_name }}

      - name: Build Backend Docker Image
        run: cd services/backend && docker build . --file Dockerfile --tag ghcr.io/justlabv1/plattform-template:backend-${{ github.sha }} --tag ghcr.io/justlabv1/plattform-template:backend-${{ github.ref_name }}

      - name: Build JustWMS Docker Image
        run: docker build . --file Dockerfile --tag ghcr.io/justlabv1/plattform-template:${{ github.sha }} --tag ghcr.io/justlabv1/plattform-template:${{ github.ref_name }}

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Push Docker Images
        run: |
          docker push ghcr.io/justlabv1/plattform-template:frontend-${{ github.sha }}
          docker push ghcr.io/justlabv1/plattform-template:frontend-${{ github.ref_name }}
          docker push ghcr.io/justlabv1/plattform-template:backend-${{ github.sha }}
          docker push ghcr.io/justlabv1/plattform-template:backend-${{ github.ref_name }}
          docker push ghcr.io/justlabv1/plattform-template:${{ github.sha }}
          docker push ghcr.io/justlabv1/plattform-template:${{ github.ref_name }}
